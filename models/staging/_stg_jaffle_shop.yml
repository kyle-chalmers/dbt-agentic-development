version: 2

models:
  - name: stg_jaffle_shop__customers
    description: "One record per customer. Renamed from raw_customers for consistent column naming."
    columns:
      - name: customer_id
        description: "Primary key — unique identifier for each customer."
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: "Customer first name."
        data_tests:
          - not_null
      - name: last_name
        description: "Customer last name."
        data_tests:
          - not_null
      - name: email
        description: "Customer email address."
        data_tests:
          - unique
          - not_null
      - name: country
        description: "Country where the customer is based."
        data_tests:
          - accepted_values:
              values: ['US', 'UK', 'CA', 'AU']

  - name: stg_jaffle_shop__orders
    description: "One record per order. Renamed from raw_orders for consistent column naming."
    columns:
      - name: order_id
        description: "Primary key — unique identifier for each order."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_jaffle_shop__customers."
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_jaffle_shop__customers')
              field: customer_id
      - name: order_date
        description: "Date the order was placed."
        data_tests:
          - not_null
      - name: status
        description: "Current fulfillment status of the order."
        data_tests:
          - accepted_values:
              values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
      - name: amount
        description: "Total order amount in USD."
        data_tests:
          - not_null
      - name: payment_method
        description: "Payment method used for the order."
        data_tests:
          - accepted_values:
              values: ['credit_card', 'debit_card', 'bank_transfer', 'gift_card']
